<!DOCTYPE html>
<html lang="es">

<head>
    <title>🎂 FELIZ CUMPLEAÑOS 🎉</title>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- Bootstrap -->
    <link rel="stylesheet" href="css/bootstrap.min.css">
    <link rel="stylesheet" href="style.css">

    <!-- Font Awesome para iconos -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

    <style>
        body {
            background: linear-gradient(135deg, #ffecd2 0%, #fcb69f 100%);
            font-family: "Comic Sans MS", cursive, sans-serif;
            overflow-x: hidden;
        }

        #name {
            font-size: 3rem;
            color: #ff4081;
            text-shadow: 2px 2px 5px #000;
        }

        .cake img {
            max-width: 200px;
            animation: bounce 2s infinite;
        }

        .balloon {
            position: absolute;
            bottom: -150px;
            font-size: 3rem;
            animation: float 8s infinite;
        }

        @keyframes float {
            0% {
                transform: translateY(0) rotate(0deg);
            }

            100% {
                transform: translateY(-120vh) rotate(360deg);
            }
        }

        @keyframes bounce {
            0%, 100% {
                transform: translateY(0);
            }

            50% {
                transform: translateY(-15px);
            }
        }
    </style>
</head>

<body>
    <div class="container text-center">
        <div class="row">
            <div class="loader mt-5">
                <button id="play" class="btn btn-lg btn-primary">
                    <i class="fa-solid fa-play"></i> Inicio
                </button>
            </div>
        </div>
    </div>

    <!-- Música -->
    <audio class="song" controls loop>
        <source src="music.mp3">
        Tu navegador no soporta audio.
    </audio>

    <!-- Confetti -->
    <canvas id="confetti"></canvas>

    <div class="main">
        <div class="container pt-5">
            <div class="row">

                <!-- Banner -->
                <div class="col-12 col-xl-6 mx-auto text-center">
                    <img src="img/banner.png" alt="banner cumpleaños" class="img-fluid">
                </div>

                <!-- Nombre -->
                <div class="col-12 text-center mt-3">
                    <div id="name" class="area fw-bold">
                        🎉 YERLDI 🎉
                    </div>
                </div>

                <!-- Mensajes -->
                <div class="col-12 text-center mt-3">
                    <div class="type-wrap">
                        <div id="typed-strings" class="typing">
                            <h2><i class="fa-solid fa-gift text-danger"></i> FELIZ CUMPLEAÑOS LICHI <i
                                    class="fa-solid fa-heart text-pink"></i></h2>
                            <h2><i class="fa-solid fa-star text-warning"></i> Que tengas un día maravilloso</h2>
                            <h2><i class="fa-solid fa-champagne-glasses text-success"></i> Lleno de felicidad 🎶</h2>
                        </div>
                        <span id="typed" style="white-space:pre;"></span>
                    </div>
                </div>

                <!-- Pastel -->
                <div class="col-12 col-xl-3 cake text-center mt-4">
                    <img src="img/cake.gif" alt="Pastel">
                    <h4 class="mt-2">🎂 Sopla las velas 🎂</h4>
                </div>
            </div>
        </div>

        <!-- Globos decorativos -->
        <img src="img/Balloon-Border.png" width="100%" class="balloon-border">
    </div>

    <!-- Globos flotando (emojis animados) -->
    <div id="balloons"></div>

</body>

<!-- Scripts -->
<script src="https://unpkg.com/magic-snowflakes/dist/snowflakes.min.js"></script>
<script src="js/jquery.js"></script>
<script src="js/typed.min.js"></script>
<script src="js/script.js"></script>

<script>
    // Animación de globos flotando 🎈
    const balloonContainer = document.getElementById("balloons");
    const colors = ["🎈", "🎉", "🎊"];

    function createBalloon() {
        const balloon = document.createElement("div");
        balloon.classList.add("balloon");
        balloon.style.left = Math.random() * 100 + "vw";
        balloon.style.animationDuration = (6 + Math.random() * 4) + "s";
        balloon.innerHTML = colors[Math.floor(Math.random() * colors.length)];
        balloonContainer.appendChild(balloon);

        setTimeout(() => {
            balloon.remove();
        }, 10000);
    }

    setInterval(createBalloon, 1000);
</script>

</html>
